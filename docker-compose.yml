services:
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: gotenberg-upload
    ports:
      - "3010:3000"
    volumes:
      - "/tmp:/dockerVolume"

  postgres:
    image: postgres:latest
    container_name: postgres-upload
    restart: always
    environment:
      POSTGRES_DB: sosialhjelp-upload
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54322:5432"
